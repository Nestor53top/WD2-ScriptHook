name: Build ScriptHook

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'CMakeLists.txt'

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: '2022'

      - name: Install CMake and Ninja
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install ninja -y
          
      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel
          
      - name: Check outputs
        run: |
          if (Test-Path bin) {
            Get-ChildItem bin\ | ForEach-Object {
              Write-Host "$($_.Name) - $([math]::Round($_.Length/1024, 1)) KB"
            }
          } elseif (Test-Path build\bin) {
            Get-ChildItem build\bin\ | ForEach-Object {
              Write-Host "$($_.Name) - $([math]::Round($_.Length/1024, 1)) KB"
            }
            Copy-Item build\bin\* bin\ -Force -ErrorAction SilentlyContinue
          } else {
            Write-Host "Looking for outputs..."
            Get-ChildItem -Recurse -Include *.dll,*.exe | ForEach-Object {
              Write-Host "$($_.FullName) - $([math]::Round($_.Length/1024, 1)) KB"
            }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WD2ScriptHook-build
          path: |
            bin/*.dll
            bin/*.exe
            bin/*.pdb
            build/bin/*.dll
            build/bin/*.exe
            build/bin/*.pdb
          retention-days: 30
          if-no-files-found: warn
